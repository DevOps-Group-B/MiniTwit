- name: Resolve deployment settings
  ansible.builtin.set_fact:
    local_deployment: "{{ deployment_mode == 'vagrant' }}"
    prometheus_image_ref: "{{ 'prometheus_image:latest' if deployment_mode == 'vagrant' else dockerhub_user ~ '/prometheus_image:latest' }}"
    grafana_image_ref: "{{ 'grafana_image:latest' if deployment_mode == 'vagrant' else dockerhub_user ~ '/grafana_image:latest' }}"
    app_image_ref: "{{ image_name ~ ':' ~ app_version if deployment_mode == 'vagrant' else dockerhub_user ~ '/' ~ image_name ~ ':' ~ app_version }}"

- name: Resolve MiniTwit container environment
  ansible.builtin.set_fact:
    minitwit_container_env: >-
      {{
        {
          'POSTGRES_CONNECTION_STRING': postgres_connection_string,
          'VIRTUAL_PORT': app_port
        }
        | combine(
            {} if not enable_tls_proxy else {
              'VIRTUAL_HOST': domain_name,
              'LETSENCRYPT_HOST': domain_name,
              'LETSENCRYPT_EMAIL': letsencrypt_email
            }
          )
      }}

- name: Force clear apt locks and corrupted cache
  ansible.builtin.shell: |
    rm -f /var/lib/apt/lists/lock
    rm -f /var/cache/apt/archives/lock
    rm -f /var/lib/dpkg/lock*
    apt-get clean
    rm -rf /var/lib/apt/lists/*
    rm -f /etc/apt/sources.list.d/docker*.list
    rm -f /etc/apt/sources.list.d/*docker*
    rm -f /etc/apt/trusted.gpg.d/docker*
    rm -f /etc/apt/keyrings/docker.gpg
  become: true
  changed_when: true

- name: Remove legacy Docker repository entry
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: absent
  become: true

- name: Remove legacy Docker GPG key file
  ansible.builtin.file:
    path: /usr/share/keyrings/docker-archive-keyring.gpg
    state: absent
  become: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true
  become: true

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
  become: true

- name: Install Docker CE
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io]
    state: present
    update_cache: true
  become: true

- name: Create Docker network for monitoring
  community.docker.docker_network:
    name: minitwit_network
    state: present
    driver: bridge

- name: Create Nginx and ACME volumes
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
  loop:
    - nginx-certs
    - nginx-vhost
    - nginx-html
    - acme
  when: enable_tls_proxy

- name: Create monitoring config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/minitwit
    - /opt/minitwit/monitoring
    - /opt/minitwit/monitoring/loki
    - /opt/minitwit/monitoring/alloy
  become: true

- name: Copy Loki production config
  ansible.builtin.copy:
    src: monitoring/loki/config.yml
    dest: /opt/minitwit/monitoring/loki/config.yml
    owner: "{{ loki_config_uid }}"
    group: "{{ loki_config_gid }}"
    mode: '0640'
  become: true

- name: Copy Alloy production config
  ansible.builtin.copy:
    src: monitoring/alloy/config.alloy
    dest: /opt/minitwit/monitoring/alloy/config.alloy
    mode: '0640'
  become: true

- name: Validate Alloy Docker log bind mount path
  ansible.builtin.assert:
    that:
      - alloy_docker_containers_host_path == '/var/lib/docker/containers'
    fail_msg: >-
      Unsafe Alloy log mount path '{{ alloy_docker_containers_host_path }}'.
      Only '/var/lib/docker/containers' is allowed.

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_user }}"
    password: "{{ lookup('env', 'DOCKERHUB_TOKEN') }}"
  when:
    - not local_deployment
    - lookup('env', 'DOCKERHUB_TOKEN') != ""

- name: Build Prometheus image locally for Vagrant
  community.docker.docker_image:
    name: prometheus_image
    tag: latest
    source: build
    force_source: true
    build:
      path: "{{ playbook_dir }}/../itu-minitwit/monitoring/prometheus"
      pull: true
  when: local_deployment

- name: Build Grafana image locally for Vagrant
  community.docker.docker_image:
    name: grafana_image
    tag: latest
    source: build
    force_source: true
    build:
      path: "{{ playbook_dir }}/../itu-minitwit/monitoring/grafana"
      pull: true
  when: local_deployment

- name: Build MiniTwit app image locally for Vagrant
  community.docker.docker_image:
    name: "{{ image_name }}"
    tag: "{{ app_version }}"
    source: build
    force_source: true
    build:
      path: "{{ playbook_dir }}/../itu-minitwit"
      pull: true
  when: local_deployment

# --- Deploy Prometheus ---
- name: Pull and Run Prometheus Container
  community.docker.docker_container:
    name: "itu-minitwit-prometheus"
    image: "{{ prometheus_image_ref }}"
    state: started
    restart_policy: always
    recreate: true
    pull: "{{ not local_deployment }}"
    ports:
      - "9090:9090"
    networks:
      - name: minitwit_network
        aliases:
          - prometheus

# --- Deploy Loki ---
- name: Create Loki volume
  community.docker.docker_volume:
    name: loki-storage
    state: present

- name: Pull and Run Loki Container
  community.docker.docker_container:
    name: "itu-minitwit-loki"
    image: "grafana/loki:3.5.0"
    state: started
    restart_policy: always
    recreate: true
    pull: true
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - "/opt/minitwit/monitoring/loki/config.yml:/etc/loki/config.yml:ro"
      - "loki-storage:/loki"
    networks:
      - name: minitwit_network
        aliases:
          - loki

# --- Deploy Alloy ---
- name: Pull and Run Alloy Container
  community.docker.docker_container:
    name: "itu-minitwit-alloy"
    image: "grafana/alloy:latest"
    state: started
    restart_policy: always
    recreate: true
    pull: true
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/tmp/alloy /etc/alloy/config.alloy
    read_only: true
    cap_drop:
      - ALL
    security_opts:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "12345:12345"
    volumes:
      - "/opt/minitwit/monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro"
      - "{{ alloy_docker_containers_host_path }}:/var/lib/docker/containers:ro"
    networks:
      - name: minitwit_network

# --- Deploy Grafana ---
- name: Create Grafana volume
  community.docker.docker_volume:
    name: grafana-storage
    state: present

- name: Pull and Run Grafana Container
  community.docker.docker_container:
    name: "itu-minitwit-grafana"
    image: "{{ grafana_image_ref }}"
    state: started
    restart_policy: always
    recreate: true
    pull: "{{ not local_deployment }}"
    ports:
      - "3000:3000"
    volumes:
      - "grafana-storage:/var/lib/grafana"
    env:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
    networks:
      - name: minitwit_network

# --- Deploy MiniTwit App ---
- name: Pull and Run MiniTwit Container
  community.docker.docker_container:
    name: "{{ container_name }}"
    image: "{{ app_image_ref }}"
    state: started
    restart_policy: always
    recreate: true
    pull: "{{ not local_deployment }}"
    env: "{{ minitwit_container_env }}"
    networks:
      - name: minitwit_network

# --- One-Time Bare-Metal Nginx/Certbot Cleanup ---
- name: Stop and disable bare-metal Nginx and Certbot services (one-time cleanup)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - nginx
    - certbot.timer
    - certbot
  ignore_errors: true
  when: enable_tls_proxy

- name: Remove bare-metal Nginx and Certbot packages (one-time cleanup)
  ansible.builtin.apt:
    name:
      - nginx
      - nginx-common
      - certbot
      - python3-certbot-nginx
    state: absent
    purge: true
  when: enable_tls_proxy

- name: Pull and Run Nginx Proxy Container
  community.docker.docker_container:
    name: "itu-minitwit-nginx-proxy"
    image: "nginxproxy/nginx-proxy:1.6"
    state: started
    restart_policy: always
    recreate: true
    pull: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "nginx-certs:/etc/nginx/certs:ro"
      - "nginx-vhost:/etc/nginx/vhost.d"
      - "nginx-html:/usr/share/nginx/html"
      - "/var/run/docker.sock:/tmp/docker.sock:ro"
    networks:
      - name: minitwit_network
  when: enable_tls_proxy

- name: Pull and Run ACME Companion Container
  community.docker.docker_container:
    name: "itu-minitwit-acme-companion"
    image: "nginxproxy/acme-companion:2.5"
    state: started
    restart_policy: always
    recreate: true
    pull: true
    env:
      NGINX_PROXY_CONTAINER: "itu-minitwit-nginx-proxy"
      DEFAULT_EMAIL: "{{ letsencrypt_email }}"
    volumes:
      - "nginx-certs:/etc/nginx/certs"
      - "nginx-vhost:/etc/nginx/vhost.d"
      - "nginx-html:/usr/share/nginx/html"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "acme:/etc/acme.sh"
    networks:
      - name: minitwit_network
  when: enable_tls_proxy
- name: Cleanup dangling images
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: true
