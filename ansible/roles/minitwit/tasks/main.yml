- name: Resolve container environment
  ansible.builtin.set_fact:
    minitwit_container_env: >-
      {{
        {
          'POSTGRES_CONNECTION_STRING': postgres_connection_string,
          'VIRTUAL_PORT': app_port
        }
        | combine(
            {} if not tls_proxy_enabled else {
              'VIRTUAL_HOST': domain_name,
              'LETSENCRYPT_HOST': domain_name,
              'LETSENCRYPT_EMAIL': letsencrypt_email
            }
          )
      }}

- name: Install Docker CE
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io]
    state: present
    update_cache: true
  become: true

- name: Create Docker network
  community.docker.docker_network:
    name: minitwit_network
    state: present

- name: Create monitoring config directories
  ansible.builtin.file:
    path: "/opt/minitwit/monitoring/{{ item }}"
    state: directory
    mode: '0755'
  loop: [loki, alloy]
  become: true

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_user }}"
    password: "{{ lookup('env', 'DOCKERHUB_TOKEN') }}"
  when: lookup('env', 'DOCKERHUB_TOKEN') != ""

- name: Run MiniTwit App Container
  community.docker.docker_container:
    name: "{{ container_name }}"
    image: "{{ dockerhub_user }}/{{ image_name }}:{{ app_version }}"
    state: started
    restart_policy: always
    recreate: true
    env: "{{ minitwit_container_env }}"
    networks: [{name: minitwit_network}]

- name: Run Prometheus
  community.docker.docker_container:
    name: "itu-minitwit-prometheus"
    image: "{{ dockerhub_user }}/prometheus_image:latest"
    state: started
    restart_policy: always
    networks: [{name: minitwit_network, aliases: [prometheus]}]
    ports: ["9090:9090"]

- name: Run Grafana
  community.docker.docker_container:
    name: "itu-minitwit-grafana"
    image: "{{ dockerhub_user }}/grafana_image:latest"
    state: started
    restart_policy: always
    networks: [{name: minitwit_network}]
    ports: ["3000:3000"]
    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"

- name: Run Nginx Proxy
  community.docker.docker_container:
    name: "itu-minitwit-nginx-proxy"
    image: "nginxproxy/nginx-proxy:1.6"
    state: started
    restart_policy: always
    ports: ["80:80", "443:443"]
    volumes:
      - "nginx-certs:/etc/nginx/certs:ro"
      - "nginx-vhost:/etc/nginx/vhost.d"
      - "nginx-html:/usr/share/nginx/html"
      - "/var/run/docker.sock:/tmp/docker.sock:ro"
    networks: [{name: minitwit_network}]
  when: tls_proxy_enabled

- name: Run ACME Companion
  community.docker.docker_container:
    name: "itu-minitwit-acme-companion"
    image: "nginxproxy/acme-companion:2.5"
    state: started
    restart_policy: always
    env:
      NGINX_PROXY_CONTAINER: "itu-minitwit-nginx-proxy"
      DEFAULT_EMAIL: "{{ letsencrypt_email }}"
    volumes:
      - "nginx-certs:/etc/nginx/certs"
      - "nginx-vhost:/etc/nginx/vhost.d"
      - "nginx-html:/usr/share/nginx/html"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "acme:/etc/acme.sh"
    networks: [{name: minitwit_network}]
  when: tls_proxy_enabled

- name: Cleanup dangling images
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: true