---
# PLAY 1: CONFIGURE DATABASE SERVER
- name: Configure Production Database
  hosts: db_servers
  become: true
  tasks:
    - name: Install PostgreSQL 16
      ansible.builtin.apt:
        name: [postgresql, postgresql-contrib, python3-psycopg2]
        state: present
        update_cache: true

    - name: Configure PostgreSQL to listen on all interfaces
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/postgresql.conf
        regexp: "^#?listen_addresses ="
        line: "listen_addresses = '*'"
      notify: Restart postgres

    - name: Allow Web Server to connect (HBA Configuration)
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        line: "host all all 0.0.0.0/0 md5"
      notify: Restart postgres

    - name: Create MiniTwit Database
      community.postgresql.postgresql_db:
        name: minitwit
      become_user: postgres

    - name: Create Database User (Matches Schema)
      community.postgresql.postgresql_user:
        db: minitwit
        name: minitwit_user
        password: "password123" 
        priv: "ALL"
      become_user: postgres

    - name: Upload and Apply Schema
      community.postgresql.postgresql_query:
        db: minitwit
        # Fixed path based on your folder structure image
        path: "{{ playbook_dir }}/roles/minitwit/files/database/schema.sql"
      become_user: postgres

  handlers:
    - name: Restart postgres
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

# PLAY 2: CONFIGURE WEB SERVER & MONITORING
- name: Provision and deploy MiniTwit
  hosts: web_servers
  become: true
  vars:
    deployment_mode: "production"
    image_name: "minitwitimage"
    container_name: "minitwit"
    app_port: "5273"
    domain_name: "minitwit.tech"
    letsencrypt_email: "bror@live.dk"
    dockerhub_user: "sn3ke"
    app_version: "{{ image_tag | default('latest') }}"
    # Build connection string dynamically
    db_conn_production: "Host={{ db_internal_ip }};Database=minitwit;Username=minitwit_user;Password=password123"
    postgres_connection_string: "{{ db_conn_production }}"
    grafana_admin_user: "admin"
    grafana_admin_password: "password123"
    tls_proxy_enabled: true
  
  roles:
    - minitwit