---
# PLAY 1: CONFIGURE DATABASE SERVER
- name: Configure Production Database
  hosts: db_servers
  become: true
  vars:
    db_name: "minitwit"
    db_user: "minitwit_user"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5

    - name: Install PostgreSQL 16
      ansible.builtin.apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
      register: apt_res
      until: apt_res is success
      retries: 6
      delay: 10

    - name: Configure PostgreSQL to listen on all interfaces
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/postgresql.conf
        regexp: "^#?listen_addresses ="
        line: "listen_addresses = '*'"
      notify: Restart postgres

    - name: Collect allowed database client IPs from app groups
      ansible.builtin.set_fact:
        db_allowed_client_ips: >-
          {{
            (
              groups.get('web_servers', [])
              + groups.get('minitwit_servers', [])
              + groups.get('minitwit_lb_primary', [])
              + groups.get('minitwit_lb_secondary', [])
            )
            | unique
            | map('extract', hostvars, 'ansible_host')
            | select('defined')
            | reject('equalto', '')
            | unique
            | list
          }}

    - name: Ensure at least one DB client IP is available
      ansible.builtin.assert:
        that:
          - db_allowed_client_ips | length > 0
        fail_msg: "No application node IPs found; refusing to widen PostgreSQL access."

    - name: Remove broad PostgreSQL access rule
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        regexp: '^host\s+all\s+all\s+0\.0\.0\.0/0\s+md5$'
        state: absent
      notify: Restart postgres

    - name: Allow only app nodes in PostgreSQL HBA
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        line: "host all all {{ item }}/32 scram-sha-256"
        insertafter: EOF
      loop: "{{ db_allowed_client_ips }}"
      notify: Restart postgres

    - name: Create MiniTwit Database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        state: present
      become: true
      become_user: postgres

    - name: Create Database User
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present
      become: true
      become_user: postgres

    - name: Grant database privileges to user
      community.postgresql.postgresql_privs:
        db: "{{ db_name }}"
        privs: ALL
        type: database
        role: "{{ db_user }}"
        state: present
      become: true
      become_user: postgres

    - name: Copy schema file to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/roles/minitwit/files/database/schema.sql"
        dest: /tmp/schema.sql
        owner: postgres
        group: postgres
        mode: '0600'
      become: true

    - name: Apply schema (skip existing objects)
      ansible.builtin.shell:
        cmd: psql -U postgres -d {{ db_name }} --set ON_ERROR_STOP=off -f /tmp/schema.sql
      become: true
      become_user: postgres
      register: schema_result
      changed_when: "'CREATE' in schema_result.stdout"
      failed_when: false

  handlers:
    - name: Restart postgres
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

# PLAY 2: CONFIGURE WEB SERVER & MONITORING
- name: Provision and deploy MiniTwit
  hosts: "web_servers:minitwit_servers"
  become: true
  vars:
    deployment_mode: "production"
    image_name: "minitwitimage"
    container_name: "minitwit"
    minitwit_app_instances: 2
    app_port: "5273"
    db_password: "{{ db_password }}"
    domain_name: "minitwit.tech"
    letsencrypt_email: ""
    dockerhub_user: "{{ dockerhub_username | default('sn3ke', true) }}"
    app_version: "{{ image_tag | default('latest', true) }}"
    db_conn_production: "Host={{ db_internal_ip | default('127.0.0.1', true) }};Database=minitwit;Username=minitwit_user;Password={{ db_password }}"
    postgres_connection_string: "{{ db_conn_production }}"
    grafana_admin_user: ""
    grafana_admin_password: ""
    tls_proxy_enabled: true
    do_api_token: ""

  roles:
    - minitwit